name: PR Manual OK Gate

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr:
    name: Validate PR for merge
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR from selected branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          BRANCH_NAME="${GITHUB_REF_NAME}"
          echo "Selected branch: $BRANCH_NAME"

          PRS=$(gh pr list \
            --head "$BRANCH_NAME" \
            --state open \
            --json number,baseRefName,isDraft,labels)

          COUNT=$(echo "$PRS" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "No hay ninguna PR abierta para la rama $BRANCH_NAME"
            exit 1
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "Hay más de una PR abierta para la rama $BRANCH_NAME. No es seguro continuar."
            exit 1
          fi

          BASE_REF=$(echo "$PRS" | jq -r '.[0].baseRefName')
          IS_DRAFT=$(echo "$PRS" | jq -r '.[0].isDraft')
          HAS_OK_LABEL=$(echo "$PRS" | jq -r '[.[0].labels[].name] | index("ok") != null')
          PR_NUMBER=$(echo "$PRS" | jq -r '.[0].number')

          echo "PR detectada: #$PR_NUMBER"

          if [ "$BASE_REF" != "main" ]; then
            echo "La PR no apunta a main."
            exit 1
          fi

          if [ "$IS_DRAFT" = "true" ]; then
            echo "La PR está en draft."
            exit 1
          fi

          if [ "$HAS_OK_LABEL" != "true" ]; then
            echo "La PR no tiene la label 'ok'."
            exit 1
          fi

          echo "Validación correcta."
