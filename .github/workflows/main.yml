name: iOS Manual Test

on:
  workflow_dispatch:

jobs:
  check-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          xcodebuild -version
          swift --version

  check-workspace:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          xcodebuild -list -workspace MyApp.xcworkspace
